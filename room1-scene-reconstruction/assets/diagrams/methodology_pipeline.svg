<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <title>从手机视频到可交互室内场景：统一方法流程</title>
  <desc>关键帧经过相机接口、深度先验、PlanarGS、TSDF和尺度标定，最终派生完整场景与资产装配场景。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2b6076"/>
    </marker>
    <marker id="orange-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#b47a21"/>
    </marker>
    <style>
      .title { font: 700 38px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill:#173b4b; }
      .sub { font: 400 20px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill:#63767d; }
      .label { font: 700 22px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill:#173b4b; }
      .body { font: 400 17px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill:#435961; }
      .small { font: 400 15px "Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill:#60737a; }
      .step { font: 700 16px Arial,sans-serif; fill:#ffffff; }
      .box { stroke:#77b2a7; stroke-width:2; rx:14; }
      .blue { fill:#e9f3f6; stroke:#4d8ba1; }
      .green { fill:#eaf5ef; stroke:#63a693; }
      .gold { fill:#fbf2df; stroke:#c8953c; }
      .gray { fill:#f3f6f6; stroke:#8ba1a7; }
      .future { fill:#f7f3ec; stroke:#b68b50; stroke-width:2; stroke-dasharray:8 7; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="70" y="72" class="title">从手机视频到可交互室内场景</text>
  <text x="72" y="107" class="sub">统一相机、深度、公制尺度与实例身份，再派生完整场景和资产装配场景</text>
  <line x1="70" y1="130" x2="1530" y2="130" stroke="#b47a21" stroke-width="4"/>

  <g transform="translate(70 175)">
    <circle cx="20" cy="22" r="20" fill="#2b6076"/><text x="14" y="29" class="step">1</text>
    <rect x="60" y="0" width="240" height="120" class="box blue"/>
    <text x="84" y="40" class="label">手机视频</text>
    <text x="84" y="74" class="body">1393 原始帧</text>
    <text x="84" y="100" class="small">抽取清晰关键帧</text>
  </g>
  <line x1="370" y1="235" x2="430" y2="235" stroke="#2b6076" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(430 175)">
    <circle cx="20" cy="22" r="20" fill="#2b6076"/><text x="14" y="29" class="step">2</text>
    <rect x="60" y="0" width="270" height="120" class="box blue"/>
    <text x="84" y="40" class="label">RGB 关键帧</text>
    <text x="84" y="74" class="body">265 张 / 约 6 fps</text>
    <text x="84" y="100" class="small">保留视差，剔除严重模糊</text>
  </g>

  <line x1="790" y1="235" x2="850" y2="235" stroke="#2b6076" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(850 175)">
    <circle cx="20" cy="22" r="20" fill="#2b6076"/><text x="14" y="29" class="step">3</text>
    <rect x="60" y="0" width="300" height="120" class="box blue"/>
    <text x="84" y="40" class="label">HLoc / COLMAP</text>
    <text x="84" y="74" class="body">相机 K、R、t + 稀疏点</text>
    <text x="84" y="100" class="small">主连通模型：211 / 265 帧</text>
  </g>
  <line x1="1270" y1="235" x2="1330" y2="235" stroke="#2b6076" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(1330 175)">
    <circle cx="20" cy="22" r="20" fill="#2b6076"/><text x="14" y="29" class="step">4</text>
    <rect x="60" y="0" width="180" height="120" class="box gray"/>
    <text x="84" y="40" class="label">统一坐标</text>
    <text x="84" y="74" class="body">同一世界基准</text>
    <text x="84" y="100" class="small">RGB / 深度 / 掩膜可对齐</text>
  </g>

  <path d="M565 295 L565 365 L335 365 L335 410" fill="none" stroke="#2b6076" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1000 295 L1000 365 L710 365 L710 410" fill="none" stroke="#2b6076" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1475 295 L1475 365 L1075 365 L1075 410" fill="none" stroke="#2b6076" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(140 410)">
    <rect width="390" height="150" class="box green"/>
    <text x="28" y="43" class="label">MASt3R / DUSt3R</text>
    <text x="28" y="78" class="body">稠密深度 + 置信度 + 法线</text>
    <text x="28" y="110" class="small">与稀疏点和相机参数对齐</text>
  </g>
  <g transform="translate(565 410)">
    <rect width="390" height="150" class="box green"/>
    <text x="28" y="43" class="label">PlanarGS</text>
    <text x="28" y="78" class="body">RGB / 深度 / 平面先验</text>
    <text x="28" y="110" class="small">优化场景专属 3D Gaussians</text>
  </g>
  <g transform="translate(990 410)">
    <rect width="390" height="150" class="box gold"/>
    <text x="28" y="43" class="label">实体分割</text>
    <text x="28" y="78" class="body">掩膜 + 稳定 instance_id</text>
    <text x="28" y="110" class="small">结构 / 家具 / 刚体 / 不确定</text>
  </g>

  <line x1="760" y1="560" x2="760" y2="620" stroke="#2b6076" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(430 620)">
    <rect width="660" height="110" class="box gray"/>
    <text x="34" y="40" class="label">渲染深度 → TSDF 融合 → 网格清理</text>
    <text x="34" y="77" class="body">可视化网格 + 简化碰撞网格</text>
  </g>
  <line x1="760" y1="730" x2="760" y2="780" stroke="#b47a21" stroke-width="3" marker-end="url(#orange-arrow)"/>
  <g transform="translate(520 780)">
    <rect width="480" height="78" class="box gold"/>
    <text x="34" y="33" class="label">沙发外宽 0.7 m</text>
    <text x="34" y="61" class="body">统一相似尺度，右手 Z-up Blender 世界</text>
  </g>

  <path d="M1000 710 L1240 710 L1240 655" fill="none" stroke="#b47a21" stroke-width="3" marker-end="url(#orange-arrow)"/>
  <path d="M1000 710 L1240 710 L1240 810" fill="none" stroke="#b47a21" stroke-width="3" marker-end="url(#orange-arrow)"/>
  <g transform="translate(1260 600)">
    <rect width="260" height="100" class="box green"/>
    <text x="28" y="38" class="label">M3A 完整版</text>
    <text x="28" y="72" class="body">保留全部静止物体</text>
  </g>
  <g transform="translate(1260 755)">
    <rect width="260" height="100" class="box future"/>
    <text x="28" y="38" class="label">M3B 资产装配版</text>
    <text x="28" y="72" class="body">只移除明确授权实例</text>
  </g>

  <text x="72" y="868" class="small">蓝色：相机接口　绿色：几何与场景优化　金色：尺度与实例编辑　虚线：后续可扩展接口</text>
</svg>
